<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NTECS | North Texas Event Connectivity Services</title>
  <style>
    :root {
      --bg-main: #ffffff;
      --bg-card: #f8fafc;
      --text-main: #0f172a;
      --text-muted: #475569;
      --blue-500: #3b82f6;
      --border-color: #e2e8f0;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-main);
      font-family: "Inter", -apple-system, sans-serif;
      color: var(--text-main);
      line-height: 1.6;
    }

    .container {
      max-width: 1100px; /* Increased for better horizontal breathing room */
      margin: 0 auto;
      padding: 60px 20px;
    }

    /* Updated Hero Layout: Grid with explicit columns */
    .hero {
      display: grid;
      grid-template-columns: 520px 1fr; /* Logo takes fixed space, text gets the rest */
      align-items: center;
      gap: 40px;
      margin-bottom: 80px;
    }

    .hero img {
      width: 500px;
      height: auto;
      display: block;
    }

    .hero-content h1 {
      font-size: 2.8rem; /* Larger title to match logo weight */
      line-height: 1.1;
      margin: 0 0 15px 0;
    }

    /* Mobile override for the Grid */
    @media (max-width: 950px) {
      .hero {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .hero img {
        margin: 0 auto;
        width: 100%;
        max-width: 400px;
      }
    }

    .pricing-wrap {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 30px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 40px;
    }
    
    /* ... (rest of the CSS remains the same as previous) */
  </style>
</head>
<body>
  <div class="container">
    <header class="hero">
      <img src="NTECS_Logo_New_2.png" alt="NTECS Logo">
      <div class="hero-content">
        <h1>North Texas Event Connectivity Services</h1>
        <div class="tagline">Enterprise-Grade WiFi for Temporary Events</div>
        <p style="color: var(--text-muted); font-size: 1.1rem;">
          Specializing in robust point-of-sale networks, vendor WiFi, and dual-carrier failover for the DFW area.
        </p>
      </div>
    </header>
    </div>
</body>
</html>
